<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concours Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Archivo+Narrow:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --rouge:#E30613;
    --encre:#17181B;
    --papier:#F7F6F2;
    --carte:#FFFFFF;
    --gris:#84868C;
    --ligne:#E3E1DA;
    --orange:#E8850C;
    --vert:#1D8A4E;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Archivo',system-ui,sans-serif;
    background:var(--papier);color:var(--encre);
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:560px;margin:0 auto;padding:20px 16px 110px}

  header{margin-bottom:14px}
  .sur-titre{
    font-family:'Archivo Narrow',sans-serif;font-size:12px;
    letter-spacing:.14em;text-transform:uppercase;
    color:var(--rouge);font-weight:600;margin-bottom:2px;
  }
  h1{font-weight:900;font-size:32px;letter-spacing:-.02em;line-height:1.05}
  .compteur{margin-top:8px;font-size:14px;color:var(--gris);font-family:'Archivo Narrow',sans-serif}
  .compteur strong{color:var(--encre)}

  /* ------- bloc mise à jour ------- */
  .maj{
    background:var(--encre);border-radius:16px;padding:16px;
    margin:14px 0;color:#fff;
  }
  .maj-titre{font-weight:900;font-size:16px}
  .maj-info{
    font-family:'Archivo Narrow',sans-serif;font-size:13px;
    color:#B9BBC1;margin-top:3px;
  }
  .btn-maj{
    margin-top:12px;width:100%;background:var(--rouge);color:#fff;
    border:none;border-radius:10px;padding:14px 0;
    font-family:'Archivo',sans-serif;font-weight:900;font-size:15.5px;
    cursor:pointer;transition:transform .1s ease;
  }
  .btn-maj:active{transform:scale(.97)}
  .btn-maj:disabled{background:#5a5b60;cursor:wait}
  .btn-maj:focus-visible{outline:2px solid #fff;outline-offset:2px}
  .maj-etat{
    font-family:'Archivo Narrow',sans-serif;font-size:13px;margin-top:10px;
    color:#B9BBC1;display:none;
  }
  .maj-etat.visible{display:block}
  .maj-etat.erreur{color:#FF8A8A}
  .maj-etat.ok{color:#7BD9A2}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .maj-etat.chargement{animation:pulse 1.2s infinite}

  /* ------- onglets ------- */
  .onglets{display:flex;gap:6px;margin:16px 0 14px}
  .onglet{
    flex:1;border:1.5px solid var(--ligne);background:var(--carte);
    border-radius:999px;padding:9px 0;font-family:'Archivo',sans-serif;
    font-weight:700;font-size:13.5px;color:var(--gris);cursor:pointer;
  }
  .onglet.actif{background:var(--encre);border-color:var(--encre);color:#fff}
  .onglet:focus-visible{outline:2px solid var(--rouge);outline-offset:2px}

  /* ------- tickets ------- */
  .liste{display:flex;flex-direction:column;gap:12px}
  .ticket{
    position:relative;background:var(--carte);
    border:1.5px solid var(--ligne);border-radius:14px;
    padding:16px 16px 14px 26px;
    box-shadow:0 1px 2px rgba(23,24,27,.04);
  }
  .ticket::before{
    content:"";position:absolute;left:11px;top:10px;bottom:10px;width:0;
    border-left:2px dashed var(--ligne);
  }
  .ticket.urgent{border-color:var(--rouge)}
  .ticket.urgent::before{border-color:#F5B5B9}
  .ticket.fait,.ticket.ignore{opacity:.62}

  .ticket-haut{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .titre{font-weight:700;font-size:16px;line-height:1.25;word-break:break-word}
  .lot{font-family:'Archivo Narrow',sans-serif;font-size:14px;color:var(--gris);margin-top:3px;font-weight:500}
  .etiquette-source{
    display:inline-block;font-family:'Archivo Narrow',sans-serif;font-size:11.5px;
    font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--gris);background:#F0EFEA;border-radius:5px;
    padding:2px 7px;margin-top:8px;
  }
  .etiquette-nouveau{
    display:inline-block;font-family:'Archivo Narrow',sans-serif;font-size:11.5px;
    font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:#fff;background:var(--vert);border-radius:5px;
    padding:2px 7px;margin-top:8px;margin-right:6px;
  }
  .badge{
    flex-shrink:0;font-family:'Archivo Narrow',sans-serif;font-weight:600;
    font-size:12.5px;padding:4px 10px;border-radius:999px;
    border:1.5px solid var(--ligne);color:var(--gris);white-space:nowrap;
  }
  .badge.b-rouge{background:var(--rouge);border-color:var(--rouge);color:#fff}
  .badge.b-orange{background:#FDF1E0;border-color:var(--orange);color:var(--orange)}
  .badge.b-fait{background:#E6F4EC;border-color:var(--vert);color:var(--vert)}
  .badge.b-gris{background:#F0EFEA}

  .notes{font-family:'Archivo Narrow',sans-serif;font-size:13.5px;color:var(--gris);margin-top:8px;line-height:1.4}
  .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .btn{
    font-family:'Archivo',sans-serif;font-weight:700;font-size:13px;
    padding:8px 14px;border-radius:9px;border:1.5px solid var(--ligne);
    background:var(--carte);color:var(--encre);cursor:pointer;
    text-decoration:none;display:inline-block;transition:transform .1s ease;
  }
  .btn:active{transform:scale(.96)}
  .btn:focus-visible{outline:2px solid var(--rouge);outline-offset:2px}
  .btn-principal{background:var(--encre);border-color:var(--encre);color:#fff}
  .btn-lien{border-color:var(--rouge);color:var(--rouge)}
  .btn-discret{border:none;background:none;color:var(--gris);padding:8px 6px}

  .vide{
    text-align:center;padding:44px 20px;border:1.5px dashed var(--ligne);
    border-radius:14px;color:var(--gris);
  }
  .vide .gros{font-size:36px;margin-bottom:10px}
  .vide p{font-family:'Archivo Narrow',sans-serif;font-size:15px;line-height:1.5}

  .flottant{
    position:fixed;bottom:22px;right:18px;
    background:var(--carte);color:var(--encre);
    border:1.5px solid var(--ligne);border-radius:999px;
    font-family:'Archivo',sans-serif;font-weight:700;font-size:14px;
    padding:13px 20px;cursor:pointer;
    box-shadow:0 4px 14px rgba(23,24,27,.15);z-index:20;
  }
  .flottant:focus-visible{outline:2px solid var(--rouge);outline-offset:2px}

  .avertissement{
    font-family:'Archivo Narrow',sans-serif;font-size:12px;color:var(--gris);
    text-align:center;margin-top:22px;line-height:1.5;
  }

  /* ------- formulaire ------- */
  .voile{
    position:fixed;inset:0;background:rgba(23,24,27,.45);z-index:30;
    display:none;align-items:flex-end;justify-content:center;
  }
  .voile.ouvert{display:flex}
  .panneau{
    background:var(--carte);width:100%;max-width:560px;
    border-radius:20px 20px 0 0;padding:22px 18px 26px;
    max-height:88vh;overflow-y:auto;
  }
  .panneau h2{font-weight:900;font-size:20px;margin-bottom:16px}
  .champ{margin-bottom:13px}
  .champ label{
    display:block;font-family:'Archivo Narrow',sans-serif;font-weight:600;
    font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--gris);margin-bottom:5px;
  }
  .champ input,.champ textarea{
    width:100%;border:1.5px solid var(--ligne);border-radius:10px;
    padding:11px 12px;font-family:'Archivo',sans-serif;font-size:15px;
    background:var(--papier);color:var(--encre);
  }
  .champ input:focus,.champ textarea:focus{outline:2px solid var(--rouge);outline-offset:-1px;border-color:var(--rouge)}
  .champ textarea{resize:vertical;min-height:56px}
  .panneau-actions{display:flex;gap:10px;margin-top:18px}
  .panneau-actions .btn{flex:1;padding:13px 0;font-size:15px;text-align:center}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="sur-titre">Suisse romande</div>
    <h1>Concours Finder</h1>
    <div class="compteur" id="compteur"></div>
  </header>

  <div class="maj">
    <div class="maj-titre">Concours du jour</div>
    <div class="maj-info" id="derniere-maj">Jamais mis à jour</div>
    <button class="btn-maj" id="btn-maj">🔍 Chercher les nouveaux concours</button>
    <div class="maj-etat" id="maj-etat"></div>
  </div>

  <div class="onglets" role="tablist">
    <button class="onglet actif" data-filtre="afaire" role="tab">À faire</button>
    <button class="onglet" data-filtre="fait" role="tab">Faits</button>
    <button class="onglet" data-filtre="tous" role="tab">Tous</button>
  </div>

  <div class="liste" id="liste"></div>
  <div class="avertissement">
    Les concours trouvés automatiquement viennent d'une recherche web :<br>
    vérifie toujours les conditions sur la page du concours avant de participer.
  </div>
</div>

<button class="flottant" id="btn-ajouter">+ Ajout manuel</button>

<div class="voile" id="voile">
  <div class="panneau" role="dialog" aria-label="Ajouter un concours">
    <h2 id="titre-panneau">Nouveau concours</h2>
    <div class="champ"><label for="f-titre">Titre du concours *</label>
      <input id="f-titre" type="text" placeholder="Ex. Concours Migros — bon de 500 CHF"></div>
    <div class="champ"><label for="f-lot">Lot à gagner</label>
      <input id="f-lot" type="text" placeholder="Ex. Bon d'achat 500 CHF"></div>
    <div class="champ"><label for="f-lien">Lien de participation</label>
      <input id="f-lien" type="url" placeholder="https://…"></div>
    <div class="champ"><label for="f-date">Date de fin</label>
      <input id="f-date" type="date"></div>
    <div class="champ"><label for="f-notes">Notes</label>
      <textarea id="f-notes"></textarea></div>
    <div class="panneau-actions">
      <button class="btn" id="btn-annuler">Annuler</button>
      <button class="btn btn-principal" id="btn-enregistrer">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const CLE = 'concours-finder-v1';
let concours = [];
let derniereMaj = null;
let filtre = 'afaire';
let editionId = null;

/* ================= SAUVEGARDE ================= */
async function charger(){
  try{
    const r = await window.storage.get(CLE);
    if(r && r.value){
      const d = JSON.parse(r.value);
      concours = d.concours || [];
      derniereMaj = d.derniereMaj || null;
    }
  }catch(e){ /* première ouverture : rien en mémoire */ }
  afficherMaj(); afficher();
}
async function sauver(){
  try{
    await window.storage.set(CLE, JSON.stringify({concours, derniereMaj}));
  }catch(e){ console.error('Sauvegarde impossible', e); }
}

/* ================= RECHERCHE AUTOMATIQUE ================= */
const btnMaj = document.getElementById('btn-maj');
const etat = document.getElementById('maj-etat');

function afficherMaj(){
  const el = document.getElementById('derniere-maj');
  if(!derniereMaj){ el.textContent = 'Jamais mis à jour'; return; }
  const d = new Date(derniereMaj);
  el.textContent = 'Dernière mise à jour : ' + d.toLocaleDateString('fr-CH') + ' à ' +
    d.toLocaleTimeString('fr-CH',{hour:'2-digit',minute:'2-digit'});
}
function setEtat(txt, classe){
  etat.textContent = txt;
  etat.className = 'maj-etat visible ' + (classe || '');
}

btnMaj.onclick = async () => {
  btnMaj.disabled = true;
  btnMaj.textContent = 'Recherche en cours…';
  setEtat('Recherche sur le web des concours suisses en cours (20 à 60 secondes)…','chargement');

  const aujourdhui = new Date().toISOString().slice(0,10);
  const dejaConnus = concours.slice(-40).map(c => c.titre).join(' | ');

  const prompt =
`Nous sommes le ${aujourdhui}. Cherche sur le web les jeux-concours GRATUITS actuellement ouverts en Suisse romande (sites comme concours.ch, coutzero.ch, radin.ch, win4win.ch, suisse-gratuite.ch, ou concours de marques suisses : Migros, Coop, radios romandes, etc.).

Critères : participation gratuite, ouverte aux résidents suisses, concours encore actif aujourd'hui.
Ignore les concours déjà connus dont voici les titres : ${dejaConnus || '(aucun)'}

Réponds UNIQUEMENT avec un tableau JSON valide, sans aucun texte avant ou après, sans balises markdown. Maximum 8 concours. Format exact :
[{"titre":"...","lot":"...","dateFin":"YYYY-MM-DD ou null","lien":"URL directe de la page du concours","source":"nom du site"}]
Si une date de fin est inconnue, mets null. N'invente JAMAIS de lien : utilise uniquement des URL vues dans les résultats de recherche.`;

  try{
    const reponse = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        messages:[{role:"user",content:prompt}],
        tools:[{type:"web_search_20250305",name:"web_search"}]
      })
    });
    const data = await reponse.json();
    if(data.error) throw new Error(data.error.message || 'Erreur API');

    const texte = (data.content || [])
      .filter(b => b.type === "text")
      .map(b => b.text).join("\n");

    const trouves = extraireJSON(texte);
    if(!trouves || !trouves.length){
      setEtat('Aucun nouveau concours trouvé cette fois. Réessaie plus tard.','');
    } else {
      const ajoutes = integrer(trouves);
      derniereMaj = new Date().toISOString();
      await sauver();
      afficherMaj(); afficher();
      setEtat(ajoutes > 0
        ? '✓ ' + ajoutes + ' nouveau' + (ajoutes>1?'x':'') + ' concours ajouté' + (ajoutes>1?'s':'')
        : 'Rien de nouveau : tous les concours trouvés sont déjà dans ta liste.','ok');
    }
  }catch(e){
    console.error(e);
    setEtat('La recherche a échoué (' + (e.message || 'erreur réseau') + '). Réessaie dans un instant.','erreur');
  }
  btnMaj.disabled = false;
  btnMaj.textContent = '🔍 Chercher les nouveaux concours';
};

function extraireJSON(texte){
  if(!texte) return null;
  const propre = texte.replace(/```json|```/g,'').trim();
  const debut = propre.indexOf('['), fin = propre.lastIndexOf(']');
  if(debut === -1 || fin === -1) return null;
  try{ return JSON.parse(propre.slice(debut, fin+1)); }
  catch(e){ return null; }
}

/* Anti-doublons : URL normalisée ou titre très proche */
function normaliserUrl(u){
  if(!u) return '';
  try{
    const url = new URL(u);
    return (url.hostname.replace(/^www\./,'') + url.pathname).replace(/\/$/,'').toLowerCase();
  }catch(e){ return u.toLowerCase(); }
}
function normaliserTitre(t){
  return (t||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
}
function estDoublon(nouveau){
  const nu = normaliserUrl(nouveau.lien);
  const nt = normaliserTitre(nouveau.titre);
  return concours.some(c => {
    if(nu && normaliserUrl(c.lien) === nu) return true;
    const ct = normaliserTitre(c.titre);
    if(!nt || !ct) return false;
    return ct === nt || ct.includes(nt) || nt.includes(ct);
  });
}
function integrer(trouves){
  let n = 0;
  const aujourdhui = new Date().toISOString().slice(0,10);
  for(const t of trouves){
    if(!t || !t.titre) continue;
    if(estDoublon(t)) continue;
    // ignorer les concours déjà expirés
    if(t.dateFin && t.dateFin !== 'null' && t.dateFin < aujourdhui) continue;
    concours.push({
      id:'c' + Date.now() + Math.floor(Math.random()*1000),
      titre:String(t.titre).slice(0,140),
      lot:t.lot ? String(t.lot).slice(0,140) : '',
      lien:t.lien && String(t.lien).startsWith('http') ? t.lien : '',
      dateFin:(t.dateFin && /^\d{4}-\d{2}-\d{2}$/.test(t.dateFin)) ? t.dateFin : '',
      source:t.source ? String(t.source).slice(0,40) : 'Recherche web',
      notes:'', statut:'afaire',
      ajoute:new Date().toISOString(), auto:true
    });
    n++;
  }
  return n;
}

/* ================= AFFICHAGE ================= */
function joursRestants(dateFin){
  if(!dateFin) return null;
  const fin = new Date(dateFin + 'T23:59:59');
  return Math.ceil((fin - new Date()) / 86400000);
}
function badgeEcheance(c){
  if(c.statut === 'fait') return '<span class="badge b-fait">Fait ✓</span>';
  if(c.statut === 'ignore') return '<span class="badge b-gris">Ignoré</span>';
  const j = joursRestants(c.dateFin);
  if(j === null) return '<span class="badge b-gris">Sans date</span>';
  if(j < 0) return '<span class="badge b-gris">Expiré</span>';
  if(j === 0) return '<span class="badge b-rouge">Dernier jour</span>';
  if(j === 1) return '<span class="badge b-rouge">Demain</span>';
  if(j <= 3) return '<span class="badge b-orange">J−' + j + '</span>';
  return '<span class="badge">J−' + j + '</span>';
}
function formatDate(d){
  if(!d) return '';
  const p = d.split('-'); return p[2] + '.' + p[1] + '.' + p[0];
}
function ajouteAujourdhui(c){
  return c.ajoute && c.ajoute.slice(0,10) === new Date().toISOString().slice(0,10);
}

function afficher(){
  const liste = document.getElementById('liste');
  const actifs = concours.filter(c => c.statut === 'afaire' && (joursRestants(c.dateFin) === null || joursRestants(c.dateFin) >= 0));
  const urgents = actifs.filter(c => { const j = joursRestants(c.dateFin); return j !== null && j <= 1; });

  document.getElementById('compteur').innerHTML =
    '<strong>' + actifs.length + '</strong> à faire' +
    (urgents.length ? ' · <strong style="color:var(--rouge)">' + urgents.length + '</strong> avant demain soir' : '');

  let visibles;
  if(filtre === 'afaire') visibles = actifs;
  else if(filtre === 'fait') visibles = concours.filter(c => c.statut === 'fait');
  else visibles = [...concours];

  visibles.sort((a,b) => {
    const ja = joursRestants(a.dateFin), jb = joursRestants(b.dateFin);
    if(ja === null && jb === null) return 0;
    if(ja === null) return 1;
    if(jb === null) return -1;
    return ja - jb;
  });

  if(visibles.length === 0){
    liste.innerHTML = '<div class="vide"><div class="gros">🎟️</div><p>' +
      (filtre === 'fait' ? 'Aucun concours fait pour l\'instant.' :
       'Liste vide.<br>Appuie sur « Chercher les nouveaux concours » pour la remplir automatiquement.') + '</p></div>';
    return;
  }

  liste.innerHTML = visibles.map(c => {
    const j = joursRestants(c.dateFin);
    const urgent = c.statut === 'afaire' && j !== null && j >= 0 && j <= 1;
    const classes = 'ticket' + (urgent?' urgent':'') + (c.statut==='fait'?' fait':'') + (c.statut==='ignore'?' ignore':'');
    return '<div class="' + classes + '">' +
      '<div class="ticket-haut"><div>' +
        '<div class="titre">' + echap(c.titre) + '</div>' +
        (c.lot ? '<div class="lot">🎁 ' + echap(c.lot) + '</div>' : '') +
        (c.dateFin ? '<div class="lot">Fin : ' + formatDate(c.dateFin) + '</div>' : '') +
        '<div>' +
          (ajouteAujourdhui(c) && c.auto ? '<span class="etiquette-nouveau">Nouveau</span>' : '') +
          (c.source ? '<span class="etiquette-source">' + echap(c.source) + '</span>' : '') +
        '</div>' +
      '</div>' + badgeEcheance(c) + '</div>' +
      (c.notes ? '<div class="notes">' + echap(c.notes) + '</div>' : '') +
      '<div class="actions">' +
        (c.lien ? '<a class="btn btn-lien" href="' + echapAttr(c.lien) + '" target="_blank" rel="noopener">Participer ↗</a>' : '') +
        (c.statut === 'afaire'
          ? '<button class="btn btn-principal" onclick="changerStatut(\'' + c.id + '\',\'fait\')">Marquer fait</button>' +
            '<button class="btn btn-discret" onclick="changerStatut(\'' + c.id + '\',\'ignore\')">Ignorer</button>'
          : '<button class="btn" onclick="changerStatut(\'' + c.id + '\',\'afaire\')">Remettre à faire</button>') +
        '<button class="btn btn-discret" onclick="modifier(\'' + c.id + '\')">Modifier</button>' +
        '<button class="btn btn-discret" onclick="supprimer(\'' + c.id + '\')">Suppr.</button>' +
      '</div></div>';
  }).join('');
}
function echap(s){ const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function echapAttr(s){ return String(s).replace(/"/g,'&quot;'); }

/* ================= ACTIONS ================= */
window.changerStatut = function(id, statut){
  const c = concours.find(x => x.id === id);
  if(c){ c.statut = statut; if(statut==='fait') c.dateParticipation = new Date().toISOString(); sauver(); afficher(); }
};
window.supprimer = function(id){
  if(!confirm('Supprimer ce concours ?')) return;
  concours = concours.filter(x => x.id !== id);
  sauver(); afficher();
};
window.modifier = function(id){
  const c = concours.find(x => x.id === id);
  if(!c) return;
  editionId = id;
  document.getElementById('titre-panneau').textContent = 'Modifier le concours';
  document.getElementById('f-titre').value = c.titre;
  document.getElementById('f-lot').value = c.lot || '';
  document.getElementById('f-lien').value = c.lien || '';
  document.getElementById('f-date').value = c.dateFin || '';
  document.getElementById('f-notes').value = c.notes || '';
  ouvrirPanneau();
};

/* ================= FORMULAIRE MANUEL ================= */
const voile = document.getElementById('voile');
function ouvrirPanneau(){ voile.classList.add('ouvert'); setTimeout(() => document.getElementById('f-titre').focus(), 50); }
function fermerPanneau(){
  voile.classList.remove('ouvert'); editionId = null;
  document.getElementById('titre-panneau').textContent = 'Nouveau concours';
  ['f-titre','f-lot','f-lien','f-date','f-notes'].forEach(id => document.getElementById(id).value = '');
}
document.getElementById('btn-ajouter').onclick = ouvrirPanneau;
document.getElementById('btn-annuler').onclick = fermerPanneau;
voile.addEventListener('click', e => { if(e.target === voile) fermerPanneau(); });

document.getElementById('btn-enregistrer').onclick = () => {
  const titre = document.getElementById('f-titre').value.trim();
  if(!titre){ document.getElementById('f-titre').focus(); return; }
  const donnees = {
    titre,
    lot: document.getElementById('f-lot').value.trim(),
    lien: document.getElementById('f-lien').value.trim(),
    dateFin: document.getElementById('f-date').value,
    notes: document.getElementById('f-notes').value.trim(),
  };
  if(editionId){
    Object.assign(concours.find(x => x.id === editionId), donnees);
  } else {
    concours.push({ id:'c'+Date.now(), statut:'afaire', source:'Ajout manuel', ajoute:new Date().toISOString(), ...donnees });
  }
  sauver(); fermerPanneau(); afficher();
};

/* ================= ONGLETS ================= */
document.querySelectorAll('.onglet').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.onglet').forEach(x => x.classList.remove('actif'));
    b.classList.add('actif');
    filtre = b.dataset.filtre;
    afficher();
  };
});

charger();
</script>
</body>
</html>
